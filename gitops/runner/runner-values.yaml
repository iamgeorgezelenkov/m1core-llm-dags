githubConfigUrl: "https://github.com/iamgeorgezelenkov/m1core-llm-dags"
githubConfigSecret: "m1core-runner-gh-token"
runnerScaleSetName: "m1core-k8s-runner"

minRunners: 0
maxRunners: 3

# Включаем режим Kubernetes правильно, добавив описание волюма
containerMode:
  type: "kubernetes"
  kubernetesModeWorkVolumeClaim:
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: 1Gi

template:
  spec:
    nodeSelector:
      type: heavy
    serviceAccountName: m1core-runner-sa
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
