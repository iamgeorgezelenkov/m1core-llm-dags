githubConfigUrl: "https://github.com/iamgeorgezelenkov/m1core-llm-dags"
githubConfigSecret: "m1core-runner-gh-token"

runnerScaleSetName: "m1core-k8s-runner"

minRunners: 0
maxRunners: 3

# Включаем режим Kubernetes (он создаст под-раннер с хуками автоматизации)
containerMode:
  type: "kubernetes"

template:
  spec:
    nodeSelector:
      type: heavy
    serviceAccountName: m1core-runner-sa
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:2.321.0
        command: ["/home/runner/run.sh"]
