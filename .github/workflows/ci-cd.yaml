name: Build LLM Portal with Buildah

on:
  push:
    paths:
      - 'apps/m1core-llm-portal/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: m1core-k8s-runner
    permissions:
      contents: read
      packages: write

    # 1. Задаем контейнер для всей джобы.
    container:
      image: quay.io/buildah/stable:latest
      # ПРАВИМ ТУТ: Запускаем от root (--user 0:0) и прокидываем privileged, 
      # чтобы Buildah нативно использовал подсистему ядра хоста для монтирования слоев.
      options: --user 0:0 --privileged --device /dev/fuse

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Логинимся в GHCR
      - name: Log in to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Собираем образ через buildah-build@v2
      - name: Buildah Action
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: m1core-llm-portal
          tags: ${{ github.sha }}
          containerfiles: |
            apps/m1core-llm-portal/Dockerfile
          context: apps/m1core-llm-portal
          # ПРАВИМ ТУТ: убираем vfs (он адски медленный). 
          # Раз теперь есть --privileged, Buildah сможет использовать нативный и быстрый overlayfs.
          extra-args: --storage-driver=overlay

      # 4. Пушим готовый результат
      - name: Push Image to GHCR
        uses: redhat-actions/push-to-registry@v1
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}
