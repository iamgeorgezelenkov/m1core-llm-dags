name: Build LLM Portal with Buildah
on:
  push:
    paths:
      - 'apps/m1core-llm-portal/**'
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: m1core-k8s-runner
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Build Image with Buildah
        run: |
          buildah bud \
            --storage-driver=vfs \
            --isolation=chroot \
            -f apps/m1core-llm-portal/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/m1core-llm-portal:${{ github.sha }} \
            apps/m1core-llm-portal

      - name: Push Image to GHCR
        run: |
          buildah push \
            --storage-driver=vfs \
            ghcr.io/${{ github.repository_owner }}/m1core-llm-portal:${{ github.sha }} \
            docker://ghcr.io/${{ github.repository_owner }}/m1core-llm-portal:${{ github.sha }}
