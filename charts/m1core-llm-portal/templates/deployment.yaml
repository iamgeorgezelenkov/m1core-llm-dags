apiVersion: apps/v1
kind: Deployment
metadata:
  name: m1core-llm-portal
  labels:
    app: m1core-llm-portal
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: m1core-llm-portal
  template:
    metadata:
      labels:
        app: m1core-llm-portal
    spec:
      containers:
        - name: m1core-llm-portal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          env:
            - name: AIRFLOW_URL
              value: {{ .Values.env.AIRFLOW_URL | quote }}
            - name: AIRFLOW_DAG_ID
              value: {{ .Values.env.AIRFLOW_DAG_ID | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
